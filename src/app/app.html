<header class="main-navbar">
  <div class="nav-container">
    <div class="nav-logo">
      <a routerLink="/home">FrancoVicente</a>
    </div>

    <nav class="nav-menu">
      <a routerLink="/home" routerLinkActive="active">Inicio</a>
      <a routerLink="/quien-soy" routerLinkActive="active">Quién Soy</a>
      <a routerLink="/resultados" routerLinkActive="active">Resultados</a>
    </nav>

    <div class="nav-auth">
  @if (usuario) {
    <div class="user-logged-info">
      <span class="nav-icon">👤</span> 
      <span class="user-name">¡Hola, {{ usuario.nombre }}!</span>
      <button (click)="onCerrarSesion()" class="btn-logout"
      routerLink="/home"
      >Cerrar Sesión</button>
    </div>
  } @else {
    <a routerLink="/login" class="btn-login">Ingresar</a>
    <a routerLink="/registro" class="btn-register">Registrarse</a>
  }
</div>
  </div>
</header>

<main class="main-content">
  <router-outlet></router-outlet>
</main>
