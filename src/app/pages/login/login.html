<div class="page-wrapper">

  <div class="login-card">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label class="form-label">Correo Electrónico</label>
        <input
          type="email"
          formControlName="email"
          placeholder="email@gmail.com"
          class="form-input"
          [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <span class="error-msg">
            Ingresá un correo válido.
          </span>
        }
      </div>

      <div class="form-group">
        <div class="label-row">
          <label class="form-label">Contraseña</label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>
        <div class="input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            class="form-input"
            [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
          <button type="button" class="toggle-password" (click)="togglePassword()">
            @if (!showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            }
          </button>
        </div>
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <span class="error-msg">
            La contraseña es requerida.
          </span>
        }
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid">
        INICIAR SESIÓN
      </button>

      <div class="divider">
        <span>O continúa con</span>
      </div>

      <div class="social-buttons">
  <button type="button" class="btn-social" (click)="loginRapido('francovicente@gmail.com', '123456')">
    <span style="font-size: 1.1rem">👤</span>
    Franco Vicente
  </button>
  <button type="button" class="btn-social" (click)="loginRapido('paulodybala@gmail.com', '123456')">
    <span style="font-size: 1.1rem">👤</span>
    Paulo Dybala
  </button>
</div>

    </form>
  </div>

  <p class="register-redirect">
    ¿No tenés cuenta?
    <a routerLink="/registro" class="register-link">Regístrate</a>
  </p>

</div>
