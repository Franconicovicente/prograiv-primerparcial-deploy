<div class="page-wrapper">
  <div class="register-card">
    <div class="card-header">
      <h1>Registrate</h1>
    </div>

    <form [formGroup]="registroForm" (ngSubmit)="onSubmit()" class="register-form" novalidate>

      <div class="form-row">
        <div class="form-group full-width">
          <label class="form-label">NOMBRE COMPLETO</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
            <input
              type="text"
              formControlName="nombre"
              placeholder="Paulo"
              class="form-input"
              [class.input-error]="registroForm.get('nombre')?.invalid && registroForm.get('nombre')?.touched"
            />
          </div>
          <span class="error-msg" *ngIf="registroForm.get('nombre')?.invalid && registroForm.get('nombre')?.touched">
            El nombre es requerido.
          </span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label class="form-label">APELLIDO</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
            <input
              type="text"
              formControlName="apellido"
              placeholder="Dybala"
              class="form-input"
              [class.input-error]="registroForm.get('apellido')?.invalid && registroForm.get('apellido')?.touched"
            />
          </div>
          <span class="error-msg" *ngIf="registroForm.get('apellido')?.invalid && registroForm.get('apellido')?.touched">
            El apellido es requerido.
          </span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label class="form-label">CORREO ELECTRÓNICO</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
            <input
              type="email"
              formControlName="email"
              placeholder="email@ejemplo.com"
              class="form-input"
              [class.input-error]="registroForm.get('email')?.invalid && registroForm.get('email')?.touched"
            />
          </div>
          <span class="error-msg" *ngIf="registroForm.get('email')?.invalid && registroForm.get('email')?.touched">
            Ingresá un correo válido.
          </span>
        </div>
      </div>

      <div class="form-row two-col">
        <div class="form-group">
          <label class="form-label">CONTRASEÑA</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
            <input
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="form-input"
              [class.input-error]="registroForm.get('password')?.invalid && registroForm.get('password')?.touched"
            />
          </div>
          <span class="error-msg" *ngIf="registroForm.get('password')?.invalid && registroForm.get('password')?.touched">
            Mínimo 6 caracteres.
          </span>
        </div>

        <div class="form-group">
          <label class="form-label">EDAD</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
            </svg>
            <input
              type="number"
              formControlName="edad"
              placeholder="Ej: 25"
              class="form-input"
              [class.input-error]="registroForm.get('edad')?.invalid && registroForm.get('edad')?.touched"
            />
          </div>
          <span class="error-msg" *ngIf="registroForm.get('edad')?.invalid && registroForm.get('edad')?.touched">
            Ingresá una edad válida.
          </span>
        </div>
      </div>

      <div class="terms-row">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox-input" required />
          <span class="checkbox-custom"></span>
          <span class="checkbox-text">Acepto los <a href="#" class="terms-link">Términos de Servicio</a> y la <a href="#" class="terms-link">Política de Privacidad</a>.</span>
        </label>
      </div>

      <button type="submit" class="btn-submit" [disabled]="registroForm.invalid">
        Crear Cuenta
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-arrow">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
        </svg>
      </button>

      <p class="login-redirect">
        ¿Ya tienes una cuenta?
        <a routerLink="/login" class="login-link">Inicia sesión aquí</a>
      </p>
    </form>
  </div>

</div>
